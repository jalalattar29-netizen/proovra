version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: dw_postgres
    environment:
      POSTGRES_USER: dw
      POSTGRES_PASSWORD: dw_password
      POSTGRES_DB: dw
    ports:
      - "5432:5432"
    volumes:
      - dw_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: dw_redis
    ports:
      - "6379:6379"
    volumes:
      - dw_redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: dw_minio
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio_password
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - dw_miniodata:/data

volumes:
  dw_pgdata:
  dw_redisdata:
  dw_miniodata:
