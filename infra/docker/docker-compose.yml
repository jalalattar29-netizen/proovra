version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: proovra_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - proovra_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: proovra_redis
    ports:
      - "6379:6379"
    volumes:
      - proovra_redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: proovra_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - proovra_miniodata:/data

volumes:
  proovra_pgdata:
  proovra_redisdata:
  proovra_miniodata:
