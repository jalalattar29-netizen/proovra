version: "3.9"

services:
  proovra-api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      S3_ALLOW_INSECURE: ${S3_ALLOW_INSECURE}
      SIGNING_KEY_ID: ${SIGNING_KEY_ID}
      SIGNING_KEY_VERSION: ${SIGNING_KEY_VERSION}
      SIGNING_PRIVATE_KEY_PATH: ${SIGNING_PRIVATE_KEY_PATH}
      SIGNING_PUBLIC_KEY_PATH: ${SIGNING_PUBLIC_KEY_PATH}
      CORS_ORIGINS: ${CORS_ORIGINS}
      VERIFY_RATE_LIMIT_MAX: ${VERIFY_RATE_LIMIT_MAX}
      VERIFY_RATE_LIMIT_WINDOW_SEC: ${VERIFY_RATE_LIMIT_WINDOW_SEC}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  proovra-worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
      args:
        DATABASE_URL: ${DATABASE_URL}
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
      S3_ALLOW_INSECURE: ${S3_ALLOW_INSECURE}
      WORKER_BUILD_INFO: ${WORKER_BUILD_INFO}
      WORKER_PORT: ${WORKER_PORT}
    ports:
      - "8090:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8090/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
